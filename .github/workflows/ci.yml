name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      # ── Download WASI binary from core release ───────────────────────────────
      # Derives the core tag from the latest semver git tag in this repo
      # (strip patch → .0).  Falls back to the latest core release when no
      # adapter tag exists yet.
      - name: Download lpdf-wasi.wasm
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p resources
          ADAPTER_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | head -1)
          CORE_TAG=$(echo "${ADAPTER_TAG:-v0.0.0}" | sed 's/\.[0-9]*$/.0/')
          echo "Resolved adapter tag: ${ADAPTER_TAG:-<none>}"
          echo "Resolved core tag: $CORE_TAG"
          # No adapter tags yet — go straight to latest
          if [ -z "$ADAPTER_TAG" ] || [ "$CORE_TAG" = "v0.0.0" ]; then
            echo "No adapter tag — downloading latest release"
            gh release download \
              --repo lpdfio/lpdf \
              --pattern "lpdf-wasi.wasm" \
              --dir resources \
              --clobber
          else
            for attempt in 1 2 3; do
              gh release download "$CORE_TAG" \
                --repo lpdfio/lpdf \
                --pattern "lpdf-wasi.wasm" \
                --dir resources \
                --clobber && break
              echo "Attempt $attempt failed — retrying in 10s..."
              sleep 10
            done
            # Fallback to latest release when the derived tag doesn't exist yet
            if [ ! -f resources/lpdf-wasi.wasm ]; then
              gh release download \
                --repo lpdfio/lpdf \
                --pattern "lpdf-wasi.wasm" \
                --dir resources \
                --clobber
            fi
          fi

      # ── Install wasmtime runtime ─────────────────────────────────────────────
      - name: Install wasmtime
        run: |
          curl -sSf https://wasmtime.dev/install.sh | bash
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"

      - name: Install composer dependencies
        run: composer install --no-interaction --prefer-dist

      # ── Fetch test fixtures and snapshots from core ──────────────────────────
      - name: Fetch test fixtures and snapshots from core
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/lpdfio/lpdf.git _core
          git -C _core sparse-checkout set test/fixtures test/snapshots
          mkdir -p test/fixtures test/snapshots
          cp -r _core/test/fixtures/. test/fixtures/
          cp -r _core/test/snapshots/. test/snapshots/
          rm -rf _core

      - name: Test
        run: php vendor/bin/phpunit test
